<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Tracker</title>
  <style>
    /* ── Tokens ─────────────────────────────────────────────────────────── */

    :root {
      --bg:            #f4f4f5;
      --surface:       #ffffff;
      --text:          #18181b;
      --text-muted:    #71717a;
      --text-faint:    #a1a1aa;
      --border:        #e4e4e7;
      --accent:        #2563eb;
      --accent-hover:  #1d4ed8;
      --accent-active: #1e40af;
    }

    [data-theme="dark"] {
      --bg:            #0f0f0f;
      --surface:       #1a1a1a;
      --text:          #e0e0e0;
      --text-muted:    #71717a;
      --text-faint:    #444;
      --border:        #2a2a2a;
      --accent:        #2563eb;
      --accent-hover:  #1d4ed8;
      --accent-active: #1e40af;
    }

    /* ── Reset ───────────────────────────────────────────────────────────── */

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 2rem;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */

    #top-bar {
      width: 100%;
      max-width: 480px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #theme-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #theme-btn:hover {
      color: var(--text);
      border-color: var(--text-muted);
    }

    /* ── Track button ────────────────────────────────────────────────────── */

    #track-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: white;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    #track-btn:hover  { background: var(--accent-hover); }
    #track-btn:active { transform: scale(0.94); background: var(--accent-active); }

    /* ── Log ─────────────────────────────────────────────────────────────── */

    #log-section {
      width: 100%;
      max-width: 480px;
    }

    #log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    #log-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #clear-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #clear-btn:hover {
      color: #e55;
      border-color: #e55;
    }

    #log {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .log-entry {
      display: flex;
      gap: 1rem;
      align-items: baseline;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border-radius: 6px;
      border-left: 3px solid var(--accent);
      animation: slide-in 0.15s ease;
    }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .entry-count {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 1.8rem;
      text-align: right;
    }

    .entry-time {
      font-size: 0.9rem;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .entry-delta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-left: auto;
      font-variant-numeric: tabular-nums;
    }

    #empty-state {
      text-align: center;
      color: var(--text-faint);
      font-size: 0.9rem;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <div id="top-bar">
    <h1>Event Tracker</h1>
    <button id="theme-btn">Dark mode</button>
  </div>

  <button id="track-btn">Log Event</button>

  <section id="log-section">
    <div id="log-header">
      <span id="log-title">Event Log</span>
      <button id="clear-btn">Clear</button>
    </div>
    <div id="log">
      <div id="empty-state">No events yet — press the button to start tracking.</div>
    </div>
  </section>

  <script>
    // URL format: ?theme=dark#1711234567,1711234580,...
    // Theme param is omitted entirely when light (the default).

    function loadTheme() {
      return new URLSearchParams(location.search).get('theme') === 'dark' ? 'dark' : 'light';
    }

    function loadTimestamps() {
      const hash = location.hash.slice(1);
      if (!hash) return [];
      return hash.split(',').map(Number).filter(n => n > 0);
    }

    function saveUrl(push = false) {
      const search = theme === 'dark' ? '?theme=dark' : '';
      const hash   = timestamps.length ? '#' + timestamps.join(',') : '';
      const url    = window.location.pathname + search + hash;
      push ? history.pushState(null, '', url) : history.replaceState(null, '', url);
    }

    function applyTheme() {
      document.documentElement.dataset.theme = theme;
      document.getElementById('theme-btn').textContent =
        theme === 'dark' ? 'Light mode' : 'Dark mode';
    }

    function formatTime(ts) {
      return new Date(ts * 1000).toLocaleTimeString([], {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }

    function formatDate(ts) {
      return new Date(ts * 1000).toLocaleDateString([], {
        year: 'numeric', month: 'short', day: 'numeric'
      });
    }

    function formatDelta(seconds) {
      let roundDirection = 'floor';
      let symbol = '+';
      if (seconds < 0){
        roundDirection = 'ceil';
        symbol = '-';
      }
      const secondsAbs = Math.abs(seconds);
      const m = Math[roundDirection](secondsAbs / 60);
      const s = secondsAbs % 60;
      return m > 0 ? `${symbol}${m}m ${s}s` : `${symbol}${s}s`;
    }

    let theme      = loadTheme();
    let timestamps = loadTimestamps();

    const logEl   = document.getElementById('log');
    const emptyEl = document.getElementById('empty-state');

    function makeEntry(ts, index, prevTs) {
      const entry = document.createElement('div');
      entry.className = 'log-entry';

      const count = document.createElement('span');
      count.className = 'entry-count';
      count.textContent = '#' + (index + 1);

      const time = document.createElement('span');
      time.className = 'entry-time';
      time.textContent = formatDate(ts) + '  ' + formatTime(ts);

      entry.appendChild(count);
      entry.appendChild(time);

      if (prevTs != null) {
        const delta = document.createElement('span');
        delta.className = 'entry-delta';
        delta.textContent = formatDelta(ts - prevTs);
        entry.appendChild(delta);
      }

      return entry;
    }

    function renderLog() {
      logEl.innerHTML = '';

      if (timestamps.length === 0) {
        logEl.appendChild(emptyEl);
        return;
      }

      for (let i = timestamps.length - 1; i >= 0; i--) {
        logEl.appendChild(makeEntry(timestamps[i], i, timestamps[i - 1]));
      }
    }

    document.getElementById('track-btn').addEventListener('click', () => {
      const now = Math.floor(Date.now() / 1000);
      timestamps.push(now);
      saveUrl();

      emptyEl.remove();
      const prevTs = timestamps.length > 1 ? timestamps[timestamps.length - 2] : null;
      logEl.insertBefore(makeEntry(now, timestamps.length - 1, prevTs), logEl.firstChild);
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      if (timestamps.length === 0) return;
      if (!confirm('Clear all ' + timestamps.length + ' event(s)?')) return;
      timestamps = [];
      saveUrl(true);
      renderLog();
    });

    document.getElementById('theme-btn').addEventListener('click', () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      applyTheme();
      saveUrl();
    });

    window.addEventListener('hashchange', () => {
      timestamps = loadTimestamps();
      renderLog();
    });

    applyTheme();
    renderLog();
  </script>
</body>
</html>
